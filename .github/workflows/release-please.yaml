name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release_please
        with:
          token: ${{ secrets.PAT }} # need to use separate PAT from GITHUB_TOKEN, so new actions can be triggered
          config-file: .github/release-please-config.json
      - if: ${{ jobs.release_please.outputs.prs_created == 'true' }}
        uses: fregante/setup-git-user@v2
      - if: ${{ jobs.release_please.outputs.prs_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$( echo ${{ jobs.release_please.outputs }} | jq -r .number )
          gh pr checkout $PR
      - if: ${{ jobs.release_please.outputs.prs_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          make prerelease
      - if: ${{ jobs.release_please.outputs.prs_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add Makefile changelog website testdata
          PR=$( echo ${{ jobs.release_please.outputs }} | jq -r .number )
          git commit -sm "chore(release): generated manifests"
          git push
